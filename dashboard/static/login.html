<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMOS MTDE – Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0f1117;
    --surface: #1a1d27;
    --border:  #2a2d3a;
    --text:    #e2e8f0;
    --muted:   #64748b;
    --accent:  #6366f1;
    --error:   #ef4444;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
  }

  .logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .logo h1 { font-size: 26px; font-weight: 700; letter-spacing: 0.5px; }
  .logo h1 span { color: var(--accent); }
  .logo p { color: var(--muted); font-size: 13px; margin-top: 4px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }

  .field { margin-bottom: 18px; }

  .error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    color: var(--error);
    font-size: 13px;
    padding: 10px 14px;
    margin-bottom: 18px;
    display: none;
  }
  .error-msg.visible { display: block; }

  button {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    padding: 11px;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 4px;
  }
  button:hover { opacity: 0.88; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>AMOS <span>MTDE</span></h1>
    <p>Multi-Tier Decision Engine</p>
  </div>

  <div class="error-msg" id="error-msg">Invalid username or password.</div>

  <form method="POST" action="/login">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" autofocus required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit">Sign In</button>
  </form>
</div>

<script>
  const params = new URLSearchParams(location.search);
  if (params.get('error')) {
    document.getElementById('error-msg').classList.add('visible');
  }
</script>
</body>
</html>
